name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build shaded jar
        run: mvn -q -B package

      - name: Smoke test the jar
        run: java -jar target/queuectl.jar help

      - name: Create GitHub Release with jar attached
        uses: softprops/action-gh-release@v2
        with:
          files: target/queuectl.jar
          generate_release_notes: true